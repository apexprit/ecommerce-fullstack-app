<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Hosting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .status {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Firebase Hosting</h1>
        <p>Your Firebase project is successfully configured with Firestore, Functions, and Hosting.</p>
        <p>Project: <strong>ecommerce-backend-2026</strong></p>
        <div class="status">
            ✅ Firestore initialized<br>
            ✅ Cloud Functions configured<br>
            ✅ Hosting ready<br>
            ✅ Authentication active
        </div>
        <p>Deploy with <code>firebase deploy</code></p>
    </div>
</body>

</html>
